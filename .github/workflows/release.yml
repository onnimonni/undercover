name: Release precompiled NIFs

on:
  push:
    tags:
      - "v*"

# Build one NIF per platform, then collect into a single release.
jobs:
  build_release:
    name: NIF ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ───────────────────────────────────────────────
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            use_cross: false

          # ── Linux ARM64 (cross-compile from x86_64 runner) ─────────────
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            use_cross: true


    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # BoringSSL (via btls-sys) requires cmake, Go, perl, and clang.
      - name: Install Linux build deps (cmake, go, perl, clang)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake golang perl clang libclang-dev pkg-config

      - name: Install macOS build deps (cmake, go)
        if: runner.os == 'macOS'
        run: |
          brew install cmake go

      # cross handles cross-compilation including BoringSSL deps in Docker.
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build NIF (native)
        if: "!matrix.use_cross"
        working-directory: native/ex_undercover_nif
        env:
          CC: clang
          CXX: clang++
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Build NIF (cross)
        if: matrix.use_cross
        working-directory: native/ex_undercover_nif
        run: |
          cross build --release --target ${{ matrix.target }}

      - name: Package NIF as .so.tar.gz
        working-directory: native/ex_undercover_nif
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TARGET=${{ matrix.target }}
          # NIF 2.17 = OTP 27/28. Production uses OTP 28 (nif-2.17).
          NIF_VERSION="2.17"
          BASENAME="libex_undercover_nif-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.so"
          # macOS produces .dylib; rustler_precompiled convention is .so for all platforms
          if [ "$(uname)" = "Darwin" ]; then
            cp target/${TARGET}/release/libex_undercover_nif.dylib ${BASENAME}
          else
            cp target/${TARGET}/release/libex_undercover_nif.so ${BASENAME}
          fi
          tar czf "${BASENAME}.tar.gz" "${BASENAME}"
          echo "ARTIFACT=${BASENAME}.tar.gz" >> $GITHUB_ENV
          # Compute SHA256
          if [ "$(uname)" = "Darwin" ]; then
            sha256sum() { shasum -a 256 "$@"; }
          fi
          sha256sum "${BASENAME}.tar.gz" | awk '{print $1}' > "${BASENAME}.tar.gz.sha256"

      - name: Upload NIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: nif-${{ matrix.target }}
          path: |
            native/ex_undercover_nif/*.tar.gz
            native/ex_undercover_nif/*.sha256
          if-no-files-found: error

  create_release:
    name: Create GitHub Release
    needs: build_release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts/

      - name: Create release and upload NIFs
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          fail_on_unmatched_files: false

  # After release is published, compute sha256 checksums directly from the
  # uploaded tarballs and commit the checksum file.
  # We bypass `mix rustler_precompiled.download` entirely — it has a catch-22:
  # compilation requires the checksum file to exist, but generating checksums
  # requires compilation. curl + sha256sum sidesteps the whole issue.
  generate_checksums:
    name: Generate checksum file
    needs: create_release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute checksums and commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NIF_VERSION="2.17"
          BASE_URL="https://github.com/onnimonni/undercover/releases/download/v${VERSION}"

          # Download each NIF tarball and compute its sha256
          ENTRIES=""
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            filename="libex_undercover_nif-v${VERSION}-nif-${NIF_VERSION}-${target}.so.tar.gz"
            curl -fsSL -o "/tmp/${filename}" "${BASE_URL}/${filename}"
            sha=$(sha256sum "/tmp/${filename}" | cut -d' ' -f1)
            ENTRIES="${ENTRIES}  \"${filename}\" =>\n    \"sha256:${sha}\",\n"
          done
          # Write Elixir-syntax checksum file to /tmp first, copy after rebase
          printf "%%{\n${ENTRIES}}\n" > /tmp/checksum-Elixir.ExUndercover.Nif.exs
          cat /tmp/checksum-Elixir.ExUndercover.Nif.exs

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main
          cp /tmp/checksum-Elixir.ExUndercover.Nif.exs checksum-Elixir.ExUndercover.Nif.exs
          git add checksum-Elixir.ExUndercover.Nif.exs
          git diff --cached --quiet || git commit -m "chore: update NIF checksums for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
