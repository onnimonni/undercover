name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  elixir:
    name: Elixir (format + credo + test)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Install deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run credo
        run: mix credo --strict

      - name: Run tests
        env:
          EX_UNDERCOVER_BUILD: "false"
        run: mix test

  rust:
    name: Rust (clippy + fmt)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # BoringSSL requires cmake, Go, perl, clang
      - name: Install build deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake golang perl clang libclang-dev pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/ex_undercover_nif/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/ex_undercover_nif/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check Rust formatting
        working-directory: native/ex_undercover_nif
        run: cargo fmt --check

      - name: Run clippy
        working-directory: native/ex_undercover_nif
        env:
          CC: clang
          CXX: clang++
        run: cargo clippy -- -D warnings
